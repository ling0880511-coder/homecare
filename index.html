<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 居家照護雲端系統 V9</title>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 您的 Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyCULwGimLD9WPD8caxI60W1n-32aauzelY",
        authDomain: "mycareapp-5d863.firebaseapp.com",
        projectId: "mycareapp-5d863",
        storageBucket: "mycareapp-5d863.firebasestorage.app",
        messagingSenderId: "735542847264",
        appId: "1:735542847264:web:f6ab950197234a58f45945",
        measurementId: "G-1DWH3QNXDD"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.careDB = { db, ref, set, onValue, push, remove };
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root {
        --morandi-red: #B07D7D;    --morandi-red-light: #F9F1F1;
        --morandi-blue: #8DA1B9;   --morandi-blue-dark: #5D7A99; --morandi-blue-deep: #3E5671; --morandi-blue-light: #F0F4F7;
        --morandi-green: #8BA8A1;  --morandi-green-dark: #6B847D; --morandi-green-deep: #4A5F59; --morandi-green-light: #F2F6F5;
        --morandi-purple: #9692AF; --morandi-purple-dark: #706B8F; --morandi-purple-deep: #54506B; --morandi-purple-light: #F4F3F7;
        --morandi-yellow: #CDBE9A; --morandi-yellow-light: #FAF8F2;
        --morandi-bg: #EAECEB; --text-dark: #4A4A4A;
    }
    * { box-sizing: border-box; font-family: -apple-system, "Noto Sans TC", sans-serif; }
    body { background-color: var(--morandi-bg); margin: 0; padding: 20px; color: var(--text-dark); display: flex; justify-content: center; }
    .app-container { width: 100%; max-width: 850px; }
    .header-nav { background: #DDE2E0; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    input[type="date"] { padding: 8px; border-radius: 12px; border: none; background: rgba(255,255,255,0.5); font-weight: bold; color: #5E716B; }
    .card { background: white; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow: hidden; }
    .card-body { padding: 20px 25px; }
    .section-title { text-align: center; font-size: 1.2rem; font-weight: bold; margin: 15px 0; display: block; }
    .border-red { border-left: 10px solid var(--morandi-red); background-color: var(--morandi-red-light); }
    .border-blue { border-left: 10px solid var(--morandi-blue); background-color: var(--morandi-blue-light); }
    .border-green { border-left: 10px solid var(--morandi-green); background-color: var(--morandi-green-light); }
    .border-purple { border-left: 10px solid var(--morandi-purple); background-color: var(--morandi-purple-light); }
    .border-yellow { border-left: 10px solid var(--morandi-yellow); background-color: var(--morandi-yellow-light); }
    .btn { padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; font-size: 0.95rem; transition: 0.3s; color: white; width: 100%; margin: 5px 0; }
    .btn-edit-blue { background-color: var(--morandi-blue-dark); width: auto; align-self: flex-end; }
    .btn-save-blue { background-color: var(--morandi-blue-deep); }
    .btn-edit-green { background-color: var(--morandi-green-dark); width: auto; align-self: flex-end; }
    .btn-save-green { background-color: var(--morandi-green-deep); }
    .btn-edit-purple { background-color: var(--morandi-purple-dark); width: auto; align-self: flex-end; }
    .btn-save-purple { background-color: var(--morandi-purple-deep); }
    .btn-rose { background-color: var(--morandi-red); }
    .role-chip { padding: 4px 12px; border-radius: 15px; background: white; border: 1px solid #ddd; font-size: 0.85rem; cursor: pointer; margin: 2px; display: inline-block; }
    .role-chip.active-red { background: var(--morandi-red); color: white; }
    .role-chip.active-yellow { background: #8B7355; color: white; }
    .scroll-container { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; }
    .post-it { flex: 0 0 260px; padding: 15px; border-radius: 15px; background: white; box-shadow: 2px 4px 8px rgba(0,0,0,0.05); }
    .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
    .input-group label { font-weight: bold; display: block; margin-bottom: 5px; color: var(--morandi-blue-deep); }
    .input-group input { width: 100%; padding: 12px; border-radius: 15px; border: 1px solid #D1D9E0; }
    .is-locked { pointer-events: none; opacity: 0.7; background-color: #f8f8f8 !important; }
    .med-tab-group { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
    .med-tab { padding: 8px 20px; border-radius: 20px; border: 1px solid var(--morandi-purple); cursor: pointer; color: var(--morandi-purple); font-weight: bold; }
    .med-tab.active { background: var(--morandi-purple); color: white; }
    .med-display-box { background: white; border-radius: 15px; padding: 15px; min-height: 60px; border: 1px solid #ddd; margin-bottom: 15px; }
    .med-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
    .rehab-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .toggle { position: relative; width: 50px; height: 28px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background: var(--morandi-green-dark); }
    input:checked + .slider:before { transform: translateX(22px); }
</style>
</head>
<body>
<div class="app-container">
    <div class="header-nav">
        <button onclick="changeDate(-1)" style="border:none; background:none; cursor:pointer; font-weight:bold;">◀ 前一天</button>
        <div style="text-align:center"><input type="date" id="date-picker"><div id="weekday-text" style="font-size:0.8rem; color:#666;"></div></div>
        <button onclick="changeDate(1)" style="border:none; background:none; cursor:pointer; font-weight:bold;">後一天 ▶</button>
    </div>

    <div class="card border-red">
        <h3 class="section-title" style="color:var(--morandi-red)">📢 重要事項公佈欄 (雲端同步) 📢</h3>
        <div class="card-body">
            <div class="scroll-container" id="notice-list"></div>
            <div style="margin-top:15px; border-top:1px solid #E2D2D2; padding-top:15px;">
                <div class="role-selector">
                    <span class="role-chip" onclick="setRole(this, 'notice')">媽媽</span><span class="role-chip" onclick="setRole(this, 'notice')">爸爸</span><span class="role-chip" onclick="setRole(this, 'notice')">溱</span><span class="role-chip" onclick="setRole(this, 'notice')">琳</span><span class="role-chip" onclick="setRole(this, 'notice')">瑄</span>
                </div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="notice-input" placeholder="新增公佈事項..." style="flex:1; padding:10px; border-radius:12px; border:1px solid #ddd;">
                    <button class="btn btn-rose" style="width:auto" onclick="addPost('notice')">發送</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-blue">
        <h3 class="section-title" style="color:var(--morandi-blue-dark)">📊 生理數值 📊</h3>
        <div class="card-body" style="display:flex; flex-direction:column;">
            <button class="btn btn-edit-blue" onclick="unlock('vital-grid')">✎ 編輯數值</button>
            <div class="input-grid is-locked" id="vital-grid" style="margin-top:15px;">
                <div class="input-group"><label>血壓</label><input type="text" id="v-bp" placeholder="120/80"></div>
                <div class="input-group"><label>心跳</label><input type="number" id="v-hr" placeholder="75"></div>
                <div class="input-group"><label>體溫</label><input type="number" step="0.1" id="v-temp" placeholder="36.5"></div>
                <div class="input-group"><label>喝水量</label><input type="number" id="v-water" placeholder="1500"></div>
                <div class="input-group"><label>大號</label><input type="number" id="v-stool"></div>
                <div class="input-group"><label>小號</label><input type="number" id="v-urine"></div>
            </div>
            <button class="btn btn-save-blue" onclick="saveVitalData()" style="margin-top:15px;">✔ 儲存當日數值</button>
            <hr style="width:100%; margin:20px 0; border:0; border-top:1px solid #ddd;"><canvas id="trendChart" style="max-height:250px;"></canvas>
        </div>
    </div>

    <div class="card border-purple">
        <h3 class="section-title" style="color:var(--morandi-purple-dark)">💊 藥物紀錄 💊</h3>
        <div class="card-body" style="display:flex; flex-direction:column;">
            <button class="btn btn-edit-purple" onclick="unlock('med-action-area')">✎ 編輯藥物項目</button>
            <div class="med-tab-group" style="margin-top:15px;">
                <div class="med-tab active" onclick="switchMedTab(this, '早')">早上</div>
                <div class="med-tab" onclick="switchMedTab(this, '中')">中午</div>
                <div class="med-tab" onclick="switchMedTab(this, '晚')">晚上</div>
            </div>
            <div class="med-display-box" id="med-display-list"></div>
            <div id="med-action-area" class="is-locked" style="border-top:1px solid #E0DDE6; padding-top:15px;">
                <div style="font-size:0.85rem; color:var(--morandi-purple-dark); margin-bottom:10px;">請點選藥物發佈：</div>
                <div>
                    <span class="role-chip" onclick="publishMed('血壓藥')">血壓藥</span><span class="role-chip" onclick="publishMed('胃藥')">胃藥</span>
                    <span class="role-chip" onclick="publishMed('維他命')">維他命</span><span class="role-chip" onclick="publishMed('助眠藥')">助眠藥</span>
                    <span class="role-chip" onclick="publishMed('止痛藥')">止痛藥</span>
                </div>
            </div>
            <button class="btn btn-save-purple" onclick="saveMedData()" style="margin-top:15px;">✔ 儲存藥物紀錄</button>
        </div>
    </div>

    <div class="card border-green">
        <h3 class="section-title" style="color:var(--morandi-green-dark)">💪 復健紀錄 💪</h3>
        <div class="card-body" style="display:flex; flex-direction:column;">
            <button class="btn btn-edit-green" onclick="unlock('rehab-grid')">✎ 編輯紀錄</button>
            <div id="rehab-grid" class="is-locked" style="margin-top:15px;">
                <div class="rehab-row"><span>早上：口腔肌肉、頭頸運動</span><label class="toggle"><input type="checkbox" id="r-m"><span class="slider"></span></label></div>
                <div class="rehab-row"><span>中午：口腔肌肉、關節活動</span><label class="toggle"><input type="checkbox" id="r-n"><span class="slider"></span></label></div>
                <div class="rehab-row"><span>晚上：口腔肌肉、頭頸運動</span><label class="toggle"><input type="checkbox" id="r-e"><span class="slider"></span></label></div>
            </div>
            <button class="btn btn-save-green" onclick="saveRehabData()" style="margin-top:15px;">✔ 儲存復健狀態</button>
        </div>
    </div>

    <div class="card border-yellow">
        <h3 class="section-title" style="color:#8B7355">📝 備註便利貼 📝</h3>
        <div class="card-body">
            <div class="scroll-container" id="note-list"></div>
            <div style="margin-top:15px; border-top:1px solid #E6D9BC; padding-top:15px;">
                <div class="role-selector">
                    <span class="role-chip" onclick="setRole(this, 'note')">媽媽</span><span class="role-chip" onclick="setRole(this, 'note')">爸爸</span><span class="role-chip" onclick="setRole(this, 'note')">溱</span><span class="role-chip" onclick="setRole(this, 'note')">琳</span><span class="role-chip" onclick="setRole(this, 'note')">瑄</span>
                </div>
                <textarea id="note-input" placeholder="輸入備註內容..." style="width:100%; padding:10px; border-radius:12px; border:1px solid #E6D9BC; min-height:80px;"></textarea>
                <button class="btn" style="background:#8B7355; margin-top:10px;" onclick="addPost('note')">張貼便利貼</button>
            </div>
        </div>
    </div>
</div>

<script>
    let curNoticeRole = "", curNoteRole = "", chartInstance = null;
    let currentMedTab = "早", tempMedList = [];
    const datePicker = document.getElementById('date-picker');

    window.onload = () => {
        const checkFirebase = setInterval(() => {
            if (window.careDB) {
                clearInterval(checkFirebase);
                initApp();
            }
        }, 100);
    };

    function initApp() {
        datePicker.value = new Date().toISOString().split('T')[0];
        datePicker.addEventListener('change', loadDateData);
        loadDateData();
        listenToPosts('notice');
        listenToPosts('note');
    }

    function loadDateData() {
        const date = datePicker.value;
        const weeks = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
        document.getElementById('weekday-text').innerText = weeks[new Date(date).getDay()];

        const { db, ref, onValue } = window.careDB;
        onValue(ref(db, 'dailyRecords/' + date), (snapshot) => {
            const data = snapshot.val() || {};
            document.getElementById('v-bp').value = data.bp || "";
            document.getElementById('v-hr').value = data.hr || "";
            document.getElementById('v-temp').value = data.temp || "";
            document.getElementById('v-water').value = data.water || "";
            document.getElementById('v-stool').value = data.stool || "";
            document.getElementById('v-urine').value = data.urine || "";
            document.getElementById('r-m').checked = data.rm || false;
            document.getElementById('r-n').checked = data.rn || false;
            document.getElementById('r-e').checked = data.re || false;
            tempMedList = data.meds || [];
            renderMeds();
            updateChart();
        });
        document.querySelectorAll('.is-locked').forEach(el => el.classList.add('is-locked'));
    }

    function unlock(id) { document.getElementById(id).classList.remove('is-locked'); }

    function saveVitalData() {
        const { db, ref, set } = window.careDB;
        const date = datePicker.value;
        set(ref(db, `dailyRecords/${date}/bp`), document.getElementById('v-bp').value);
        set(ref(db, `dailyRecords/${date}/hr`), document.getElementById('v-hr').value);
        set(ref(db, `dailyRecords/${date}/temp`), document.getElementById('v-temp').value);
        set(ref(db, `dailyRecords/${date}/water`), document.getElementById('v-water').value);
        set(ref(db, `dailyRecords/${date}/stool`), document.getElementById('v-stool').value);
        set(ref(db, `dailyRecords/${date}/urine`), document.getElementById('v-urine').value);
        alert("生理數據已同步至雲端");
    }

    function saveRehabData() {
        const { db, ref, set } = window.careDB;
        const date = datePicker.value;
        set(ref(db, `dailyRecords/${date}/rm`), document.getElementById('r-m').checked);
        set(ref(db, `dailyRecords/${date}/rn`), document.getElementById('r-n').checked);
        set(ref(db, `dailyRecords/${date}/re`), document.getElementById('r-e').checked);
        alert("復健進度已同步");
    }

    function switchMedTab(el, time) {
        document.querySelectorAll('.med-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active'); currentMedTab = time; renderMeds();
    }

    function publishMed(name) {
        tempMedList.push({ id: Date.now(), timeTag: currentMedTab, name: name });
        renderMeds();
    }

    function renderMeds() {
        const listArea = document.getElementById('med-display-list');
        const filtered = tempMedList.filter(m => m.timeTag === currentMedTab);
        listArea.innerHTML = filtered.map(m => `
            <div class="med-item"><span>● ${m.name}</span><button onclick="removeMed(${m.id})" style="background:none;border:none;color:red;cursor:pointer;">✕</button></div>
        `).join('') || `<div style="color:#aaa;text-align:center;padding:10px;">${currentMedTab}無紀錄</div>`;
    }

    function removeMed(id) {
        tempMedList = tempMedList.filter(m => m.id !== id); renderMeds();
    }

    function saveMedData() {
        const { db, ref, set } = window.careDB;
        set(ref(db, `dailyRecords/${datePicker.value}/meds`), tempMedList);
        alert("用藥紀錄已同步");
    }

    function listenToPosts(type) {
        const { db, ref, onValue } = window.careDB;
        onValue(ref(db, 'posts/' + type), (snapshot) => {
            const data = snapshot.val() || {};
            const posts = Object.keys(data).map(key => ({...data[key], fbKey: key})).reverse();
            document.getElementById(type + '-list').innerHTML = posts.map(p => `
                <div class="post-it" style="background:${type==='note'?'#FFFDF5':'white'}; flex:0 0 260px; padding:15px; border-radius:15px; box-shadow:2px 4px 8px rgba(0,0,0,0.05);">
                    <span style="font-size:0.7rem; color:#888;">${p.time}<br>發布者：${p.role}</span>
                    <div style="margin:8px 0; font-size:0.95rem;">${p.text}</div>
                    <button onclick="deletePost('${type}', '${p.fbKey}')" style="font-size:0.7rem; cursor:pointer; background:none; border:1px solid #ccc; border-radius:5px;">刪除</button>
                </div>
            `).join('');
        });
    }

    function addPost(type) {
        const role = (type === 'notice') ? curNoticeRole : curNoteRole;
        if(!role) { alert("請選擇角色"); return; }
        const input = document.getElementById(type + '-input');
        if(!input.value) return;
        const { db, ref, push } = window.careDB;
        push(ref(db, 'posts/' + type), { role, text: input.value, time: new Date().toLocaleString() });
        input.value = "";
    }

    function deletePost(type, key) {
        if(confirm("確定刪除此訊息？")) {
            const { db, ref, remove } = window.careDB;
            remove(ref(db, `posts/${type}/${key}`));
        }
    }

    function setRole(el, type) {
        el.parentElement.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active-red', 'active-yellow'));
        el.classList.add(type === 'notice' ? 'active-red' : 'active-yellow');
        if(type === 'notice') curNoticeRole = el.innerText; else curNoteRole = el.innerText;
    }

    function changeDate(n) {
        let d = new Date(datePicker.value); d.setDate(d.getDate() + n);
        datePicker.value = d.toISOString().split('T')[0]; loadDateData();
    }

    function updateChart() {
        const { db, ref, onValue } = window.careDB;
        onValue(ref(db, 'dailyRecords'), (snapshot) => {
            const allData = snapshot.val() || {};
            const currentMonth = datePicker.value.substring(0, 7);
            const labels = [], bpData = [], hrData = [];
            for(let i=1; i<=31; i++) {
                const dStr = currentMonth + '-' + String(i).padStart(2, '0');
                if(allData[dStr] && allData[dStr].bp) {
                    labels.push(i + '日');
                    bpData.push(parseInt(allData[dStr].bp) || null);
                    hrData.push(parseInt(allData[dStr].hr) || null);
                }
            }
            const ctx = document.getElementById('trendChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [
                    { label: '血壓', data: bpData, borderColor: '#B07D7D', tension: 0.3 },
                    { label: '心跳', data: hrData, borderColor: '#8DA1B9', tension: 0.3 }
                ]}
            });
        });
    }
</script>
</body>
</html>
